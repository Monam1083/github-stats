name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"     # runs once daily at midnight UTC
  workflow_dispatch:          # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=Monam1083&show_icons=true&theme=dark&hide_border=true&bg_color=0c0c0c&title_color=10B981&icon_color=10B981&text_color=f0ece4&ring_color=10B981
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak stats card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=Monam1083&theme=dark&hide_border=true&background=0c0c0c&ring=10B981&fire=10B981&currStreakLabel=10B981&sideLabels=888070&dates=888070
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest before writing JSON
        run: git pull origin main

      - name: Generate raw stats JSON and commit immediately
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p profile
          USER_JSON=$(curl -s -H "Authorization: token $GH_TOKEN" https://api.github.com/users/Monam1083)
          REPOS=$(echo "$USER_JSON" | grep -o '"public_repos": *[0-9]*' | grep -o '[0-9]*')
          FOLLOWERS=$(echo "$USER_JSON" | grep -o '"followers": *[0-9]*' | grep -o '[0-9]*')
          STARS=0
          PAGE=1
          while true; do
            PAGE_JSON=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/users/Monam1083/repos?per_page=100&page=$PAGE")
            COUNT=$(echo "$PAGE_JSON" | grep -o '"stargazers_count": *[0-9]*' | grep -o '[0-9]*' | paste -sd+ - | bc 2>/dev/null || echo 0)
            STARS=$((STARS + COUNT))
            LEN=$(echo "$PAGE_JSON" | grep -o '"id":' | wc -l)
            if [ "$LEN" -lt 100 ]; then break; fi
            PAGE=$((PAGE + 1))
          done
          echo "{\"public_repos\": $REPOS, \"followers\": $FOLLOWERS, \"total_stars\": $STARS}" > profile/stats.json
          echo "----- Verifying file was written -----"
          ls -la profile/
          cat profile/stats.json
          echo "----- Committing now -----"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.json
          git status
          git commit -m "Update stats.json" || echo "Nothing to commit"
          git push
