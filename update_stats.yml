name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"     # runs once daily at midnight UTC
  workflow_dispatch:          # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=Monam1083&show_icons=true&theme=dark&hide_border=true&bg_color=0c0c0c&title_color=10B981&icon_color=10B981&text_color=f0ece4&ring_color=10B981
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak stats card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=Monam1083&theme=dark&hide_border=true&background=0c0c0c&ring=10B981&fire=10B981&currStreakLabel=10B981&sideLabels=888070&dates=888070
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update stats cards" || exit 0
          git push
